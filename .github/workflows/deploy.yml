name: Deploy to AWS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r tests/requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    needs: test
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-SAMDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine deployment environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "stage=production" >> $GITHUB_OUTPUT
            echo "stack_name=yamanashi-event-stream-prod" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
            echo "stack_name=yamanashi-event-stream-dev" >> $GITHUB_OUTPUT
          fi

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          # Build parameter overrides
          PARAMS="Stage=${{ steps.env.outputs.stage }} LogLevel=${{ steps.env.outputs.stage == 'production' && 'INFO' || 'DEBUG' }}"
          
          # Add Consumer Bus ARNs if configured
          if [ -n "${{ secrets.CONSUMER_BUS_ARNS }}" ]; then
            PARAMS="$PARAMS ConsumerBusArns=${{ secrets.CONSUMER_BUS_ARNS }}"
          fi
          
          sam deploy \
            --config-env ${{ steps.env.outputs.stage == 'production' && 'production' || 'default' }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides $PARAMS

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: ${{ steps.env.outputs.stage }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Stack**: ${{ steps.env.outputs.stack_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth**: OIDC Role" >> $GITHUB_STEP_SUMMARY
          echo "- **Consumer Buses**: ${{ secrets.CONSUMER_BUS_ARNS && 'Configured (multiple)' || 'Not configured (local only)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success (includes no-change deploys)" >> $GITHUB_STEP_SUMMARY